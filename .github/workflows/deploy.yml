name: Deploy stack & Lightsail

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # allow OIDC for aws-actions/configure-aws-credentials
  contents: read

env:
  AWS_REGION: eu-central-1
  NODE_VERSION: '20'
  LIGHTSAIL_SERVICE_NAME: score-game

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      sls: ${{ steps.changes.outputs.sls }}
    steps:
      - uses: actions/checkout@v4
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            sls:
              - 'serverless.yml'
              - 'src/lambdas/**'

  serverless-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: filter
    if: needs.filter.outputs.sls == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      # (lightsailctl не нужен в этой джобе — удалён)
      - run: npm ci
      - run: npx serverless deploy --stage production
        env:
          API_KEY: ${{ secrets.API_KEY }}

  lightsail-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: [filter, serverless-deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData

      - name: Docker build with secrets
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData
        run: |
          docker build \
            -t score-game:latest \
            --build-arg SESSION_PASSWORD="$SESSION_PASSWORD" \
            --build-arg SESSION_COOKIE_NAME="$SESSION_COOKIE_NAME" \
            --build-arg API_KEY="$API_KEY" \
            --build-arg TABLE_NAME="$TABLE_NAME" \
            .

      - name: Install lightsailctl
        run: |
          curl -sSL https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl -o lightsailctl
          chmod +x lightsailctl
          sudo mv lightsailctl /usr/local/bin/lightsailctl

      - name: Push & deploy
        run: |
          set -eo pipefail

          # Ensure the container service exists (idempotent)
          aws lightsail create-container-service --no-cli-pager --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --power nano --scale 1 2>/dev/null || true

          # Push local image and capture reference
          IMAGE_REF=$(aws lightsail push-container-image \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --label score-game-app \
            --image score-game:latest \
            --query 'image' --output text)

          echo "Image pushed: $IMAGE_REF"

          # Deploy new version using concise flags
          CONTAINERS="score-game-app=image=${IMAGE_REF},environment=AWS_REGION=eu-central-1,AWS_TABLE_NAME=SoccerGameData,ports=3000=HTTP"
          PUBLIC_EP="containerName=score-game-app,containerPort=3000,healthCheck={path=/api/health}"

          aws lightsail create-container-service-deployment \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --containers "$CONTAINERS" \
            --public-endpoint "$PUBLIC_EP"
