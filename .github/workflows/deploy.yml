name: Build & Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: meta
        run: |
          IMAGE=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Prepare build secrets
        run: |
          echo -n "${{ secrets.SESSION_PASSWORD }}" > /tmp/session_password
          echo -n "${{ secrets.SESSION_COOKIE_NAME }}" > /tmp/session_cookie_name
          echo -n "${{ secrets.API_KEY }}" > /tmp/api_key

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          secret-files: |
            session_password=/tmp/session_password
            session_cookie_name=/tmp/session_cookie_name
            api_key=/tmp/api_key

      - name: Cleanup build secrets
        if: always()
        run: rm -f /tmp/session_password /tmp/session_cookie_name /tmp/api_key

  deploy-to-hetzner:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy artifacts (compose, Caddyfile, systemd units, backup scripts)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile,deploy/fetcher.service,deploy/fetcher.timer,deploy/backup.service,deploy/backup.timer,deploy/backup.sh,deploy/restore-latest.sh,deploy/RESTORE.md"
          target: "/opt/tipmgr/"
          strip_components: 1

      - name: Deploy — pull image, apply migrations, restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/tipmgr

            # Set IMAGE_TAG for this deploy (sourced by docker-compose).
            export IMAGE_TAG="${{ github.sha }}"
            grep -v '^IMAGE_TAG=' .env > .env.tmp || true
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.tmp
            mv .env.tmp .env
            chmod 600 .env

            # Make scripts executable after scp (flags don't survive scp).
            chmod +x backup.sh restore-latest.sh

            # Ensure systemd units are in /etc/systemd/system and current.
            sudo cp fetcher.service fetcher.timer backup.service backup.timer /etc/systemd/system/
            sudo systemctl daemon-reload

            # Pull new image and recreate app; migrations run inside container CMD.
            docker compose pull app
            docker compose up -d postgres
            docker compose up -d app
            docker compose up -d caddy

            # Enable timers (idempotent).
            sudo systemctl enable --now fetcher.timer backup.timer

            # Wait for app health.
            for i in $(seq 1 30); do
              if docker compose exec -T app curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "App is healthy."
                break
              fi
              if [ $i -eq 30 ]; then
                echo "App health check failed after 30 attempts"
                docker compose logs --tail=100 app
                exit 1
              fi
              sleep 2
            done

      - name: External smoke test
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "https://${{ secrets.CADDY_DOMAIN || 'pickthescore.app' }}/api/health" > /dev/null; then
              echo "External health check passed."
              exit 0
            fi
            echo "Waiting for external health... ($i/12)"
            sleep 5
          done
          echo "External health check failed."
          exit 1
