name: Build & Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: meta
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Prepare build secrets
        run: |
          echo -n "${{ secrets.SESSION_PASSWORD }}" > /tmp/session_password
          echo -n "${{ secrets.SESSION_COOKIE_NAME }}" > /tmp/session_cookie_name
          echo -n "${{ secrets.API_KEY }}" > /tmp/api_key

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          secret-files: |
            session_password=/tmp/session_password
            session_cookie_name=/tmp/session_cookie_name
            api_key=/tmp/api_key

      - name: Cleanup build secrets
        if: always()
        run: rm -f /tmp/session_password /tmp/session_cookie_name /tmp/api_key

  deploy-to-hetzner:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "--- key fingerprint ---"
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "WARNING: could not read key"
          echo "--- corresponding public key (paste into server authorized_keys if missing) ---"
          ssh-keygen -y -f ~/.ssh/deploy_key || echo "WARNING: could not derive pubkey"
          echo "--- byte length of secret ---"
          wc -c ~/.ssh/deploy_key

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o ConnectTimeout=15 \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              -v \
              "${HETZNER_USER}@${HETZNER_HOST}" \
              "GHCR_TOKEN='${GHCR_TOKEN}' REPO='${REPO}' SHA='${SHA}' ACTOR='${ACTOR}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/pckthscr

          # 1. Sync deploy/ artifacts via shallow git clone into a staging dir.
          rm -rf .repo-staging
          git clone --depth 1 --branch main \
            "https://x-access-token:${GHCR_TOKEN}@github.com/${REPO}.git" .repo-staging

          cp .repo-staging/deploy/docker-compose.yml .
          cp .repo-staging/deploy/*.service .repo-staging/deploy/*.timer .
          cp .repo-staging/deploy/backup.sh .repo-staging/deploy/restore-latest.sh .
          cp .repo-staging/deploy/RESTORE.md .
          rm -rf .repo-staging
          chmod +x backup.sh restore-latest.sh

          # 2. Pin IMAGE_TAG for this deploy.
          grep -v '^IMAGE_TAG=' .env > .env.tmp || true
          echo "IMAGE_TAG=${SHA}" >> .env.tmp
          mv .env.tmp .env
          chmod 600 .env

          # 3. Log in to ghcr.io.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${ACTOR}" --password-stdin

          # 4. Install systemd units.
          cp fetcher.service fetcher.timer backup.service backup.timer /etc/systemd/system/
          systemctl daemon-reload

          # 5. Pull + (re)start containers.
          docker compose pull app
          docker compose up -d postgres
          docker compose up -d app

          # 6. Enable timers.
          systemctl enable --now fetcher.timer backup.timer

          # 7. Wait for app health.
          for i in $(seq 1 30); do
            if docker compose exec -T app curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is healthy."
              exit 0
            fi
            [ "$i" = 30 ] && { echo "Health check failed"; docker compose logs --tail=100 app; exit 1; }
            sleep 2
          done
          REMOTE
