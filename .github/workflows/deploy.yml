name: Deploy stack & Lightsail

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # allow OIDC for aws-actions/configure-aws-credentials
  contents: read

env:
  AWS_REGION: eu-central-1
  NODE_VERSION: '20'
  LIGHTSAIL_SERVICE_NAME: score-game

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      sls: ${{ steps.changes.outputs.sls }}
    steps:
      - uses: actions/checkout@v4
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            sls:
              - 'serverless.yml'
              - 'src/lambdas/**'

  serverless-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: filter
    if: needs.filter.outputs.sls == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci
      - run: npx serverless deploy --stage production
        env:
          API_KEY: ${{ secrets.API_KEY }}

  lightsail-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: [filter, serverless-deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData

      - name: Docker build with secrets
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData
        run: |
          docker build \
            -t score-game:latest \
            --build-arg SESSION_PASSWORD="$SESSION_PASSWORD" \
            --build-arg SESSION_COOKIE_NAME="$SESSION_COOKIE_NAME" \
            --build-arg API_KEY="$API_KEY" \
            --build-arg TABLE_NAME="$TABLE_NAME" \
            .

      - name: Push & deploy
        run: |
          set -eo pipefail

          # Ensure the container service exists (idempotent)
          aws lightsail create-container-service --no-cli-pager --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --power nano --scale 1 2>/dev/null || true

          # Push local image and capture reference with proper error handling
          echo "Pushing image to Lightsail..."
          PUSH_OUTPUT=$(aws lightsail push-container-image \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --label score-game-app \
            --image score-game:latest 2>&1)
          
          echo "Push output: $PUSH_OUTPUT"
          
          # Extract image reference from output using grep and sed
          IMAGE_REF=$(echo "$PUSH_OUTPUT" | grep -E '":score-game-app\.' | sed -E 's/.*(".*score-game-app\.[^"]*").*/\1/' | tr -d '"')
          
          if [ -z "$IMAGE_REF" ]; then
            echo "Failed to extract image reference from push output"
            exit 1
          fi

          echo "Image pushed: $IMAGE_REF"

          # Define container and public endpoint configurations
          CONTAINERS_JSON='{"score-game-app":{"image":"'"$IMAGE_REF"'","environment":{"AWS_REGION":"eu-central-1","AWS_TABLE_NAME":"SoccerGameData"},"ports":{"3000":"HTTP"}}}'
          PUBLIC_ENDPOINT_JSON='{"containerName":"score-game-app","containerPort":3000,"healthCheck":{"path":"/"}}'

          # Deploy the new version using the configurations
          aws lightsail create-container-service-deployment \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --containers "$CONTAINERS_JSON" \
            --public-endpoint "$PUBLIC_ENDPOINT_JSON"