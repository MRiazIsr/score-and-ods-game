name: Deploy stack & Lightsail

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # allow OIDC for aws-actions/configure-aws-credentials
  contents: read

env:
  AWS_REGION: eu-central-1
  NODE_VERSION: '20'
  LIGHTSAIL_SERVICE_NAME: score-game
  TABLE_NAME: SoccerGameData
  DEPLOY_TIMEOUT_MINUTES: 10

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      sls: ${{ steps.changes.outputs.sls }}
    steps:
      - uses: actions/checkout@v4
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            sls:
              - 'serverless.yml'
              - 'src/lambdas/**'

  serverless-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: filter
    if: needs.filter.outputs.sls == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci
      - name: Deploy serverless with verification
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # First create the CloudFormation change set (dry-run)
          echo "Generating CloudFormation change set..."
          npx serverless deploy --stage production --noDeploy

          # If the above succeeds, proceed with the actual deployment
          if [ $? -eq 0 ]; then
            echo "Validation successful, proceeding with deployment..."
            npx serverless deploy --stage production
          else
            echo "⚠️ Deployment validation failed, please check the CloudFormation template"
            exit 1
          fi

  lightsail-deploy:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    needs: [filter, serverless-deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: unfor19/install-aws-cli-action@v1
        with:
          version: '2'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData

      - name: Docker build with runtime env variables
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          SESSION_COOKIE_NAME: ${{ secrets.SESSION_COOKIE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TABLE_NAME: SoccerGameData
        run: |
          # Start the build with proper error handling
          echo "Building Docker image..."
          set -e

          # Create .env file for build (will be removed by .dockerignore)
          cat > .env.build << EOF
          SESSION_PASSWORD=$SESSION_PASSWORD
          SESSION_COOKIE_NAME=$SESSION_COOKIE_NAME
          API_KEY=$API_KEY
          TABLE_NAME=$TABLE_NAME
          EOF

          # Build with arguments
          docker build \
            -t score-game:latest \
            --build-arg SESSION_PASSWORD="$SESSION_PASSWORD" \
            --build-arg SESSION_COOKIE_NAME="$SESSION_COOKIE_NAME" \
            --build-arg API_KEY="$API_KEY" \
            --build-arg TABLE_NAME="$TABLE_NAME" \
            .

          # Cleanup
          rm -f .env.build

          # Verify build succeeded
          if [ $? -ne 0 ]; then
            echo "Docker build failed"
            exit 1
          fi

          echo "Docker build completed successfully"

      - name: Push & deploy
        run: |
          set -eo pipefail

          # Ensure the container service exists (idempotent)
          echo "Creating/verifying Lightsail container service..."
          aws lightsail create-container-service --no-cli-pager --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --power nano --scale 1 2>/dev/null || true

          # Verify AWS credentials and connection
          echo "Verifying AWS credentials..."
          aws sts get-caller-identity

          # Push the Docker image to Lightsail
          echo "Pushing image to Lightsail..."
          PUSH_RESULT=0
          PUSH_OUTPUT=$(aws lightsail push-container-image \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --label score-game-app \
            --image score-game:latest 2>&1) || PUSH_RESULT=$?

          if [ $PUSH_RESULT -ne 0 ]; then
            echo "Error pushing image to Lightsail: $PUSH_OUTPUT"
            echo "Exit code: $PUSH_RESULT"
            exit $PUSH_RESULT
          fi

          echo "Push output: $PUSH_OUTPUT"

          # Extract image reference using the AWS CLI query parameter instead of regex
          echo "Getting container images..."
          CONTAINER_IMAGES=$(aws lightsail get-container-images \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME")

          echo "Container images: $CONTAINER_IMAGES"

          # Get the most recent image (first in the list)
          IMAGE_REF=$(echo "$CONTAINER_IMAGES" | jq -r '.containerImages[0].image')

          if [ -z "$IMAGE_REF" ] || [ "$IMAGE_REF" = "null" ]; then
            echo "Failed to extract image reference"
            exit 1
          fi

          echo "Image pushed: $IMAGE_REF"

          # Define container and public endpoint configurations using workflow variables
          CONTAINERS_JSON='{"score-game-app":{"image":"'"$IMAGE_REF"'","environment":{"AWS_REGION":"'"$AWS_REGION"'","AWS_TABLE_NAME":"'"$TABLE_NAME"'"},"ports":{"3000":"HTTP"}}}'
          PUBLIC_ENDPOINT_JSON='{"containerName":"score-game-app","containerPort":3000,"healthCheck":{"path":"/api/health","successCodes":"200","healthyThreshold":2,"unhealthyThreshold":2,"intervalSeconds":5,"timeoutSeconds":2}}'

          echo "Deploying with containers config: $CONTAINERS_JSON"
          echo "Public endpoint config: $PUBLIC_ENDPOINT_JSON"

          # Deploy the new version using the configurations
          aws lightsail create-container-service-deployment \
            --no-cli-pager \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --containers "$CONTAINERS_JSON" \
            --public-endpoint "$PUBLIC_ENDPOINT_JSON"

          echo "Deployment initiated. Monitoring status..."

          # Monitor deployment status with timeout
          START_TIME=$(date +%s)
          TIMEOUT=$((${DEPLOY_TIMEOUT_MINUTES} * 60))

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ $ELAPSED -gt $TIMEOUT ]; then
              echo "Deployment timeout after ${DEPLOY_TIMEOUT_MINUTES} minutes!"
              exit 1
            fi

            SERVICE_INFO=$(aws lightsail get-container-service \
              --no-cli-pager \
              --service-name "$LIGHTSAIL_SERVICE_NAME")

            STATE=$(echo "$SERVICE_INFO" | jq -r '.containerService.state')
            echo "Current state: $STATE (elapsed: $((ELAPSED/60))m $((ELAPSED%60))s)"

            if [ "$STATE" == "READY" ]; then
              echo "✅ Deployment completed successfully!"

              # Get the public endpoint URL
              ENDPOINT_URL=$(echo "$SERVICE_INFO" | jq -r '.containerService.url')
              echo "Application available at: $ENDPOINT_URL"

              # Verify the health endpoint is responding
              echo "Verifying health endpoint..."
              curl -s "${ENDPOINT_URL}/api/health" || echo "Warning: Health check failed but deployment completed"

              break
            elif [ "$STATE" == "DEPLOYING" ] || [ "$STATE" == "PENDING" ]; then
              echo "Deployment in progress..."
              sleep 20
            else
              echo "❌ Deployment failed with state: $STATE"
              echo "Container logs may provide more information."
              exit 1
            fi
          done