# Production Docker Compose for Hetzner VPS.
# Deployed to /opt/pckthscr/docker-compose.yml during CI.
#
# NOTE: no Caddy container — the existing system-level Caddy at /etc/caddy/Caddyfile
# already runs on the host and has a vhost for pickthescore.app:8080 that reverse-proxies
# to 127.0.0.1:3000 (where this compose exposes the app). Cloudflare orange-cloud
# terminates TLS at the edge and forwards to VPS:8080 through its proxy.
#
# Services:
#   - postgres: Postgres 16 with persistent bind-mount
#   - app:      Next.js app image from ghcr.io (runs `prisma migrate deploy` + server.js)

services:
  postgres:
    image: postgres:16-alpine
    container_name: pckthscr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pckthscr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pckthscr}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-mriazisr/score-and-ods-game}:${IMAGE_TAG:-latest}
    container_name: pckthscr-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-pckthscr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pckthscr}?schema=public
      SESSION_PASSWORD: ${SESSION_PASSWORD}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      API_KEY: ${API_KEY}
      API_URL: https://api.football-data.org/v4
      # OAuth runtime secrets (populated by deploy.yml from GitHub Secrets).
      # Empty if not yet configured — providers surface "not configured" in UI.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    # Expose ONLY to loopback — the host-level Caddy reaches us via 127.0.0.1:3000.
    # This prevents direct access to port 3000 from outside the server.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
