service: tip-manager
frameworkVersion: '3'

plugins:
  - serverless-esbuild

custom:
  tableName: SoccerGameData
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    platform: node
    target: node20
    external: ['aws-sdk']
  tsConfig:
    outDir: .build

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  memorySize: 256
  region: eu-central-1
  stage: ${opt:stage, 'production'}

  environment:
    AWS_DB_REGION: ${self.custom.region}
    AWS_TABLE_NAME: ${self:custom.tableName}
    AWS_APP_API_URL: "https://api.football-data.org/v4"
    AWS_APP_SERVICE_KEY: ${env:API_KEY}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

  iamRoleStatements:
    # DynamoDB access
    - Effect: Allow
      Action:
        - dynamodb:*
      Resource:
        - Fn::GetAtt: [ SoccerGameDataTable, Arn ]
        - Fn::Join: ['', [ Fn::GetAtt: [ SoccerGameDataTable, Arn ], '/index/*' ]]

    # EventBridge Scheduler & Lambda permissions - restricted to resources used by this service
    - Effect: Allow
      Action:
        - events:PutRule
        - events:PutTargets
      Resource: 
        - !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/tip-manager-${self:provider.stage}*
    - Effect: Allow
      Action:
        - lambda:AddPermission
      Resource: 
        - !GetAtt MatchFetcherLambdaFunction.Arn

functions:
  matchFetcher:
    handler: src/lambdas/competitionsDataFetcher/matchFetcher.handler
    timeout: 300
    memorySize: 256
    architecture: arm64
    events:
      - schedule:
          rate: 'rate(1 hour)'
          enabled: true
    environment:
      AWS_TABLE_NAME: ${self:custom.tableName}
      AWS_APP_SERVICE_KEY: ${env:API_KEY}
      AWS_APP_API_URL: "https://api.football-data.org/v4"

resources:
  Resources:
    SoccerGameDataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PartitionKey
            AttributeType: S
          - AttributeName: SortKey
            AttributeType: S
        KeySchema:
          - AttributeName: PartitionKey
            KeyType: HASH
          - AttributeName: SortKey
            KeyType: RANGE
        SSESpecification:
          SSEEnabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        Tags:
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: tip-manager
